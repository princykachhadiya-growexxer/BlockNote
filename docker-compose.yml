services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: blocknote
      POSTGRES_PASSWORD: blocknote
      POSTGRES_DB: blocknote
    ports:
      - "5432:5432"
    volumes:
      - blocknote_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blocknote -d blocknote"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  blocknote_pg:
